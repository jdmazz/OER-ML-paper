name: oer_research

# Direct dependencies only; the solver resolves the rest (e.g. shap pulls in
# numba, llvmlite, slicer, cloudpickle). No build strings, so this solves on
# Linux, Intel macOS, Apple Silicon, and Windows rather than one exported host.
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.12

  # ── Scientific stack ──────────────────────────────────────
  - numpy=1.26.*          # kept <2.0 for shap/numba compatibility
  - pandas=2.2.*
  - scipy=1.13.*          # least_squares (dJdVpreprocess)
  - scikit-learn=1.5.*    # >=1.4 for root_mean_squared_error
  - matplotlib=3.9.*
  - seaborn=0.13.*
  - shap=0.45.*
  - openpyxl=3.1.*      # pandas engine for reading .xlsx (data/external/)

  # ── Notebook runtime ──────────────────────────────────────
  - jupyterlab
  - ipykernel
  - ipywidgets
